<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$']] }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        :root { --primary: #4a90e2; --success: #2ecc71; --error: #e74c3c; --bg: #f4f7f6; }
        body { background: var(--bg); font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 15px; }
        
        .quiz-container { background: white; width: 100%; max-width: 550px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; }
        .content { padding: 25px; }
        
        h2 { white-space: pre-line; line-height: 1.6; margin: 0 0 20px 0; font-size: 1.2rem; }
        
        .options-grid { display: grid; gap: 10px; }
        .option-item { padding: 15px; border: 2px solid #edf2f7; border-radius: 10px; cursor: pointer; transition: 0.2s; }
        .option-item.correct { background: #d4edda; border-color: var(--success); color: #155724; font-weight: bold; }
        .option-item.wrong { background: #f8d7da; border-color: var(--error); color: #721c24; }
        .option-item.disabled { pointer-events: none; }

        #next-btn { background: var(--primary); color: white; border: none; width: 100%; padding: 20px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        
        /* EXPLANATION BELOW BUTTON */
        #explanation-box {
            padding: 20px;
            background: #fff;
            border-top: 1px solid #eee;
            border-left: 6px solid var(--primary);
            line-height: 1.6;
            white-space: pre-line;
            font-size: 0.95rem;
        }
        .exp-label { color: var(--primary); font-weight: bold; text-transform: uppercase; font-size: 0.75rem; display: block; margin-bottom: 5px; }

        .hidden { display: none !important; }

        /* AD MODAL */
        #ad-modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100; color: white;
            text-align: center; }
        #ad-image { max-width: 80%; max-height: 50%; border-radius: 10px; border: 2px solid #555; margin-bottom: 20px; }
        .timer-box { position: relative; width: 60px; height: 60px; }
        .timer-box svg { transform: rotate(-90deg); width: 60px; height: 60px; }
        circle { fill: none; stroke-width: 4; stroke-dasharray: 176; stroke-dashoffset: 0; stroke-linecap: round; }
        .bg-circle { stroke: #333; }
        .progress-circle { stroke: var(--primary); transition: stroke-dashoffset 1s linear; }
        .timer-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: bold; }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="loading" style="text-align:center; padding:3rem;">Loading Questions...</div>

    <div id="ad-modal" class="hidden">
        <img id="ad-image" src="https://firststatemontessori.org/wp-content/uploads/2023/11/FSMA_break_blog.cover_.png">
        <div class="timer-box">
            <svg><circle class="bg-circle" cx="30" cy="30" r="28"></circle><circle id="timer-progress" class="progress-circle" cx="30" cy="30" r="28"></circle></svg>
            <div id="ad-countdown" class="timer-text">7</div>
        </div>
    </div>

    <div id="quiz-box" class="content hidden">
        <h2 id="question"></h2>
        <div class="options-grid" id="options-container"></div>
    </div>
    
    <button id="next-btn" class="hidden">Next Question →</button>
    
    <div id="explanation-box" class="hidden">
        <span class="exp-label">Explanation & Solution</span>
        <div id="explanation-text"></div>
    </div>
</div>

<script>
    // REPLACE THIS URL
    const API_URL = 'https://script.google.com/macros/s/AKfycbxU2n1UiBH5_EgKdHIMMIx69ClT9ASIeDL9e2kHjI2bnhqCX3SdIIUb9TERWAsEsIts/exec';
    
    let questions = [];
    let currentIndex = 0;
    let questionsSinceAd = 0;

    async function loadData() {
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            questions = data.filter(q => q.question);
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('quiz-box').classList.remove('hidden');
            startNewCycle();
        } catch (e) { document.getElementById('loading').innerText = "Error loading data."; }
    }

    function startNewCycle() {
        shuffle(questions);
        currentIndex = 0;
        showQuestion();
    }

    function showQuestion() {
        const data = questions[currentIndex];
        document.getElementById('question').innerHTML = data.question;
        document.getElementById('next-btn').classList.add('hidden');
        document.getElementById('explanation-box').classList.add('hidden');
        
        const container = document.getElementById('options-container');
        container.innerHTML = ''; 

        ['a', 'b', 'c', 'd'].forEach(l => {
            if(data[l]) {
                const div = document.createElement('div');
                div.className = 'option-item';
                div.innerHTML = data[l];
                div.onclick = () => checkAnswer(div, l);
                container.appendChild(div);
            }
        });
        if (window.MathJax) MathJax.typesetPromise();
    }

    function checkAnswer(selectedDiv, chosen) {
        const data = questions[currentIndex];
        const correct = String(data.correct).toLowerCase().trim();
        const opts = document.querySelectorAll('.option-item');
        
        opts.forEach(o => o.classList.add('disabled'));

        if (chosen === correct) {
            selectedDiv.classList.add('correct');
        } else {
            selectedDiv.classList.add('wrong');
            const letters = ['a', 'b', 'c', 'd'];
            const idx = letters.indexOf(correct);
            if(idx !== -1) opts[idx].classList.add('correct');
        }

        // SHOW BUTTON FIRST
        document.getElementById('next-btn').classList.remove('hidden');

        // SHOW EXPLANATION BELOW BUTTON
        const expBox = document.getElementById('explanation-box');
        const expText = document.getElementById('explanation-text');
        
        // Debugging log (Open browser console F12 to see this)
        console.log("Checking for explanation in column 'explanation'. Value:", data.explanation);

        if (data.explanation) {
            expText.innerHTML = data.explanation;
            expBox.classList.remove('hidden');
            if (window.MathJax) MathJax.typesetPromise([expText]);
        }
    }

    document.getElementById('next-btn').onclick = () => {
        currentIndex++;
        questionsSinceAd++;
        if (questionsSinceAd >= 25) {
            questionsSinceAd = 0;
            showAd();
        } else {
            proceed();
        }
    };

    function showAd() {
        const modal = document.getElementById('ad-modal');
        const progress = document.getElementById('timer-progress');
        const text = document.getElementById('ad-countdown');
        modal.classList.remove('hidden');
        
        let time = 7;
        text.innerText = time;
        progress.style.strokeDashoffset = 0;

        const timer = setInterval(() => {
            time--;
            text.innerText = time;
            progress.style.strokeDashoffset = 176 - (time / 5) * 176;
            if (time <= 0) {
                clearInterval(timer);
                modal.classList.add('hidden');
                proceed();
            }
        }, 1000);
    }

    function proceed() {
        if (currentIndex < questions.length) showQuestion(); else startNewCycle();
    }

    function shuffle(a) {
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
    }

    loadData();
</script>
</body>
</html>
